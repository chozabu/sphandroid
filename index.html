<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>GPU SPH Fluid</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; background:#000; color:#fff;
    font-family: -apple-system, system-ui, sans-serif; touch-action:none;
    overscroll-behavior:none; user-select:none; -webkit-user-select:none; }
  canvas { display:block; width:100vw; height:100vh; touch-action:none; }
  .hud { position:fixed; top:8px; left:8px; z-index:10; font-size:12px;
    opacity:0.85; pointer-events:none; text-shadow:0 1px 2px #000; }
  .btns { position:fixed; top:8px; right:8px; z-index:10;
    display:flex; gap:6px; flex-direction:column; }
  button { background:#1a1a1aee; color:#fff; border:1px solid #3a3a3a;
    padding:8px 12px; font-size:13px; border-radius:6px; cursor:pointer;
    -webkit-tap-highlight-color:transparent; }
  button:active { background:#333; }
  #panel { position:fixed; bottom:8px; left:8px; right:8px; z-index:10;
    background:#0a0a0aee; border:1px solid #333; border-radius:8px;
    padding:10px 12px; font-size:12px; max-height:50vh; overflow-y:auto;
    transition: max-height 0.2s; }
  #panel.collapsed { max-height: 28px; overflow:hidden; padding:6px 12px; }
  #panelHdr { display:flex; justify-content:space-between; align-items:center;
    cursor:pointer; user-select:none; font-weight:bold; }
  .row { display:grid; grid-template-columns: 90px 1fr 56px; gap:8px;
    align-items:center; margin-top:6px; }
  .row label { opacity:0.85; }
  .row input[type=range] { width:100%; }
  .row .val { text-align:right; font-variant-numeric: tabular-nums; opacity:0.9; }
  .row select { width:100%; background:#1a1a1a; color:#fff; border:1px solid #333;
    padding:4px; border-radius:4px; font-size:12px; }
  #err { position:fixed; inset:0; display:none; align-items:center;
    justify-content:center; padding:20px; background:#200; color:#fcc;
    font-size:14px; text-align:center; z-index:99; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud" id="hud">GPU SPH Fluid v0.5<br><span id="fps">--</span> fps &middot; <span id="np">--</span> p</div>
<div class="btns">
  <button id="reset">Reset</button>
  <button id="clearC">Clear walls</button>
  <button id="motion">Enable motion</button>
</div>
<div id="panel" class="">
  <div id="panelHdr"><span>Tuning</span><span id="panelToggle">▼</span></div>
  <div id="panelBody">
    <div class="row">
      <label>particles</label>
      <select id="s_count">
        <option value="32">1,024 (32²)</option>
        <option value="64">4,096 (64²)</option>
        <option value="128" selected>16,384 (128²)</option>
        <option value="192">36,864 (192²)</option>
        <option value="256">65,536 (256²)</option>
      </select>
      <span class="val" id="v_count">128²</span>
    </div>
    <div class="row">
      <label>splat px</label>
      <input id="s_splat" type="range" min="2" max="28" step="1" value="10">
      <span class="val" id="v_splat">10</span>
    </div>
    <div class="row">
      <label>rest density</label>
      <input id="s_rest" type="range" min="1" max="80" step="0.5" value="22">
      <span class="val" id="v_rest">22</span>
    </div>
    <div class="row">
      <label>stiffness</label>
      <input id="s_stiff" type="range" min="0.05" max="4" step="0.05" value="0.6">
      <span class="val" id="v_stiff">0.60</span>
    </div>
    <div class="row">
      <label>viscosity</label>
      <input id="s_xsph" type="range" min="0" max="0.5" step="0.01" value="0.12">
      <span class="val" id="v_xsph">0.12</span>
    </div>
    <div class="row">
      <label>damping</label>
      <input id="s_damp" type="range" min="0.95" max="1" step="0.001" value="0.997">
      <span class="val" id="v_damp">0.997</span>
    </div>
    <div class="row">
      <label>gravity</label>
      <input id="s_grav" type="range" min="0" max="4" step="0.05" value="1.4">
      <span class="val" id="v_grav">1.40</span>
    </div>
    <div class="row">
      <label>show fluid</label>
      <input id="s_blob" type="range" min="0" max="1" step="1" value="1">
      <span class="val" id="v_blob">on</span>
    </div>
    <div class="row">
      <label>show pts</label>
      <input id="s_pts" type="range" min="0" max="1" step="1" value="1">
      <span class="val" id="v_pts">on</span>
    </div>
  </div>
</div>
<div id="err"></div>
<script id="main">
"use strict";
// === SPH GPU FLUID ===
// Approach: grid-based density splat + Lagrangian particles in float textures.
// Pass 1: splat particle kernels into densityTex (additive blend).
// Pass 2: fullscreen pass -> forceTex = -grad(pressure)/density.
// Pass 3: fullscreen pass -> next stateTex (pos,vel) integrating force, gravity,
//         walls, and collision mask. Pass 4: render particles to canvas.

(function () {
const canvas = document.getElementById('c');
const errEl = document.getElementById('err');
function fail(msg) { errEl.style.display = 'flex'; errEl.textContent = msg; throw new Error(msg); }

const gl = canvas.getContext('webgl2', { antialias:false, alpha:false, premultipliedAlpha:false });
if (!gl) fail('WebGL2 not available. Try a recent Chrome/Firefox.');
if (!gl.getExtension('EXT_color_buffer_float')) fail('EXT_color_buffer_float not available.');

const N_SIDE = 128;            // 128*128 = 16384 particles
const N = N_SIDE * N_SIDE;
const GRID = 128;              // density / force / collision grid
const DPR = Math.min(window.devicePixelRatio || 1, 2);

function resize() {
  canvas.width  = Math.floor(window.innerWidth  * DPR);
  canvas.height = Math.floor(window.innerHeight * DPR);
}
resize();
window.addEventListener('resize', resize);

// --- shaders are appended in subsequent script blocks below ---
window.__sph = { gl, canvas, N_SIDE, N, GRID, DPR, fail };
})();
</script>
<script id="shaders">
"use strict";
(function () {
const S = window.__sph;

// Fullscreen quad vertex shader
S.VS_QUAD = `#version 300 es
layout(location=0) in vec2 a_pos;
out vec2 v_uv;
void main() {
  v_uv = a_pos * 0.5 + 0.5;
  gl_Position = vec4(a_pos, 0.0, 1.0);
}`;

// Particle splat vertex shader (reads pos from state texture)
S.VS_SPLAT = `#version 300 es
layout(location=0) in float a_index;
uniform sampler2D u_state;
uniform float u_nside;
uniform float u_pointSize;
void main() {
  float idx = a_index;
  vec2 uv = (vec2(mod(idx, u_nside), floor(idx / u_nside)) + 0.5) / u_nside;
  vec4 s = texture(u_state, uv);
  gl_Position = vec4(s.xy * 2.0 - 1.0, 0.0, 1.0);
  gl_PointSize = u_pointSize;
}`;

// Velocity-splat vertex: same as density splat but also forwards velocity.
S.VS_VSPLAT = `#version 300 es
layout(location=0) in float a_index;
uniform sampler2D u_state;
uniform float u_nside;
uniform float u_pointSize;
out vec2 v_vel;
void main() {
  float idx = a_index;
  vec2 uv = (vec2(mod(idx, u_nside), floor(idx / u_nside)) + 0.5) / u_nside;
  vec4 s = texture(u_state, uv);
  gl_Position = vec4(s.xy * 2.0 - 1.0, 0.0, 1.0);
  gl_PointSize = u_pointSize;
  v_vel = s.zw;
}`;

// Velocity-splat fragment: outputs (vx*k, vy*k, k, 0) with same kernel as
// density splat, so weighted-average velocity = (sum_vx, sum_vy) / sum_k.
S.FS_VSPLAT = `#version 300 es
precision highp float;
in vec2 v_vel;
out vec4 outColor;
void main() {
  vec2 c = gl_PointCoord - 0.5;
  float r2 = dot(c, c);
  if (r2 > 0.25) discard;
  float r = sqrt(r2) * 2.0;
  float k = 1.0 - 3.0*r*r + 2.0*r*r*r;
  outColor = vec4(v_vel * k, k, 0.0);
}`;

// Splat fragment: smooth Gaussian-like kernel with cubic-spline shape.
// Wide soft kernels avoid the step-y density field that traps particles
// in hex lattices.
S.FS_SPLAT = `#version 300 es
precision highp float;
out vec4 outColor;
void main() {
  vec2 c = gl_PointCoord - 0.5;
  float r2 = dot(c, c);
  if (r2 > 0.25) discard;
  float r = sqrt(r2) * 2.0;          // [0,1]
  float k = 1.0 - 3.0*r*r + 2.0*r*r*r; // cubic Hermite, smooth at center & edge
  outColor = vec4(k, 0.0, 0.0, 1.0);
}`;

// Force-field pass: density -> -grad(pressure) / density.
// Uses a slightly nonlinear (Tait-ish) pressure with a small "background"
// term so even moderately-dense interiors produce gradient, not just edges.
S.FS_FORCE = `#version 300 es
precision highp float;
in vec2 v_uv;
uniform sampler2D u_density;
uniform float u_gridSize;
uniform float u_rest;
uniform float u_stiff;
out vec4 outColor;
float pressure(float d) {
  float x = max(d / u_rest, 0.0);
  // Tait-ish: soft below rest, much stiffer above.
  return u_stiff * (x*x - 1.0);
}
void main() {
  float h = 1.5 / u_gridSize;        // wider stencil = smoother gradient field
  float dc = texture(u_density, v_uv).r;
  float dl = texture(u_density, v_uv - vec2(h, 0.0)).r;
  float dr = texture(u_density, v_uv + vec2(h, 0.0)).r;
  float du = texture(u_density, v_uv + vec2(0.0, h)).r;
  float dd = texture(u_density, v_uv - vec2(0.0, h)).r;
  vec2 gradP = vec2(pressure(dr) - pressure(dl),
                    pressure(du) - pressure(dd)) / (2.0 * h * u_gridSize);
  vec2 force = -gradP / max(dc, 0.5);
  outColor = vec4(force, dc, 1.0);
}`;

// Particle update pass.
//   * Force is computed PER PARTICLE by sampling density at sub-cell
//     positions (not from a precomputed grid force texture). LINEAR
//     filtering on u_density gives sub-texel gradient resolution.
//   * XSPH viscosity couples each particle's velocity to the kernel-weighted
//     average velocity of nearby particles (sampled from u_velGrid). This
//     prevents static hex-packed clusters: any neighbour that's moving
//     drags the cluster's interior particles with it.
S.FS_UPDATE = `#version 300 es
precision highp float;
in vec2 v_uv;
uniform sampler2D u_state;
uniform sampler2D u_density;
uniform sampler2D u_velGrid;
uniform sampler2D u_collision;
uniform vec2  u_gravity;
uniform float u_dt;
uniform float u_gridSize;
uniform float u_damping;
uniform float u_rest;
uniform float u_stiff;
uniform float u_xsph;     // 0..1 viscosity blend strength
out vec4 outColor;

float pressure(float d) {
  float x = max(d / u_rest, 0.0);
  return u_stiff * (x*x - 1.0);
}

void main() {
  vec4 s = texture(u_state, v_uv);
  vec2 pos = s.xy;
  vec2 vel = s.zw;

  // Per-particle pressure-gradient force, sampled at the particle's
  // exact sub-cell position so neighbouring particles in the same cell
  // get distinct forces.
  float h = 1.0 / u_gridSize;
  float dC = texture(u_density, pos).r;
  float dL = texture(u_density, pos - vec2(h, 0.0)).r;
  float dR = texture(u_density, pos + vec2(h, 0.0)).r;
  float dU = texture(u_density, pos + vec2(0.0, h)).r;
  float dD = texture(u_density, pos - vec2(0.0, h)).r;
  vec2 gradP = vec2(pressure(dR) - pressure(dL),
                    pressure(dU) - pressure(dD)) / (2.0 * h);
  vec2 force = -gradP / max(dC, 0.5);

  // XSPH viscosity: pull our velocity toward the local average.
  vec4 vSum = texture(u_velGrid, pos);
  vec2 avgVel = vSum.xy / max(vSum.z, 1e-3);
  vel = mix(vel, avgVel, u_xsph);

  vel += u_dt * (force + u_gravity);
  vel *= u_damping;

  vec2 newPos = pos + u_dt * vel;

  // Walls
  float pad = 0.005;
  if (newPos.x < pad)        { newPos.x = pad;        vel.x =  abs(vel.x) * 0.35; }
  if (newPos.x > 1.0 - pad)  { newPos.x = 1.0 - pad;  vel.x = -abs(vel.x) * 0.35; }
  if (newPos.y < pad)        { newPos.y = pad;        vel.y =  abs(vel.y) * 0.35; }
  if (newPos.y > 1.0 - pad)  { newPos.y = 1.0 - pad;  vel.y = -abs(vel.y) * 0.35; }

  // Collision mask
  float mask = texture(u_collision, newPos).r;
  if (mask > 0.25) {
    float h = 1.0 / u_gridSize;
    float ml = texture(u_collision, newPos - vec2(h, 0.0)).r;
    float mr = texture(u_collision, newPos + vec2(h, 0.0)).r;
    float mu = texture(u_collision, newPos + vec2(0.0, h)).r;
    float md = texture(u_collision, newPos - vec2(0.0, h)).r;
    vec2 n = vec2(ml - mr, md - mu);
    float nl = length(n);
    if (nl > 1e-4) {
      n /= nl;
      newPos = pos + n * 0.003;
      vel = reflect(vel, n) * 0.4;
    } else {
      newPos = pos;
      vel *= -0.3;
    }
  }
  outColor = vec4(newPos, vel);
}`;

// Particle render to screen
S.VS_RENDER = `#version 300 es
layout(location=0) in float a_index;
uniform sampler2D u_state;
uniform float u_nside;
uniform float u_pointSize;
uniform vec2  u_aspect; // multiply NDC to letterbox-fit a square sim
out float v_speed;
void main() {
  float idx = a_index;
  vec2 uv = (vec2(mod(idx, u_nside), floor(idx / u_nside)) + 0.5) / u_nside;
  vec4 s = texture(u_state, uv);
  vec2 ndc = (s.xy * 2.0 - 1.0) * u_aspect;
  gl_Position = vec4(ndc, 0.0, 1.0);
  gl_PointSize = u_pointSize;
  v_speed = length(s.zw);
}`;

S.FS_RENDER = `#version 300 es
precision highp float;
in float v_speed;
out vec4 outColor;
void main() {
  vec2 c = gl_PointCoord - 0.5;
  float r = length(c);
  if (r > 0.5) discard;
  float a = smoothstep(0.5, 0.0, r);
  vec3 cold = vec3(0.20, 0.55, 1.00);
  vec3 hot  = vec3(1.00, 0.75, 0.30);
  vec3 col = mix(cold, hot, clamp(v_speed * 1.2, 0.0, 1.0));
  outColor = vec4(col * a, a);
}`;

// Background pass: draws a fluid surface from the density texture plus
// the collision walls. Lets you see whether the field is one connected
// blob (good) or many disconnected pools (the failure mode we're chasing).
S.FS_BG = `#version 300 es
precision highp float;
in vec2 v_uv;
uniform sampler2D u_collision;
uniform sampler2D u_density;
uniform vec2 u_aspect;
uniform float u_rest;
uniform float u_blobAlpha;
out vec4 outColor;
void main() {
  vec2 p = (v_uv * 2.0 - 1.0) / u_aspect;
  if (abs(p.x) > 1.0 || abs(p.y) > 1.0) { outColor = vec4(0.0,0.0,0.0,1.0); return; }
  vec2 simUV = p * 0.5 + 0.5;
  float d = texture(u_density, simUV).r;
  float m = texture(u_collision, simUV).r;
  float surf = smoothstep(u_rest * 0.25, u_rest * 1.0, d) * u_blobAlpha;
  vec3 deep    = vec3(0.04, 0.16, 0.40);
  vec3 surface = vec3(0.30, 0.65, 1.00);
  vec3 fluid = mix(deep, surface, smoothstep(u_rest * 0.5, u_rest * 2.0, d));
  vec3 wall = vec3(0.55, 0.35, 0.65);
  vec3 bg = vec3(0.02, 0.02, 0.05);
  vec3 col = mix(bg, fluid, surf);
  col = mix(col, wall, smoothstep(0.05, 0.5, m));
  outColor = vec4(col, 1.0);
}`;

// Touch paint: draws an additive radial blob into the collision tex
S.FS_PAINT = `#version 300 es
precision highp float;
in vec2 v_uv;
uniform vec2 u_center;
uniform float u_radius;
uniform float u_value;
out vec4 outColor;
void main() {
  float d = distance(v_uv, u_center);
  float a = smoothstep(u_radius, u_radius * 0.4, d);
  outColor = vec4(u_value * a, 0.0, 0.0, 1.0);
}`;
})();
</script>
<script id="setup">
"use strict";
(function () {
const S = window.__sph;
const gl = S.gl;

function compile(type, src) {
  const sh = gl.createShader(type);
  gl.shaderSource(sh, src);
  gl.compileShader(sh);
  if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
    const log = gl.getShaderInfoLog(sh);
    console.error(log, src);
    S.fail('Shader compile failed: ' + log);
  }
  return sh;
}
function link(vs, fs) {
  const p = gl.createProgram();
  gl.attachShader(p, compile(gl.VERTEX_SHADER, vs));
  gl.attachShader(p, compile(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
    S.fail('Link failed: ' + gl.getProgramInfoLog(p));
  }
  // cache uniform locations
  p.U = (n) => gl.getUniformLocation(p, n);
  return p;
}

S.programs = {
  splat:  link(S.VS_SPLAT,  S.FS_SPLAT),
  vsplat: link(S.VS_VSPLAT, S.FS_VSPLAT),
  force:  link(S.VS_QUAD,   S.FS_FORCE),
  update: link(S.VS_QUAD,   S.FS_UPDATE),
  render: link(S.VS_RENDER, S.FS_RENDER),
  bg:     link(S.VS_QUAD,   S.FS_BG),
  paint:  link(S.VS_QUAD,   S.FS_PAINT),
};

// --- Textures & FBOs ---
function makeTex(w, h, internalFormat, format, type, data, linear) {
  const t = gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D, t);
  gl.texImage2D(gl.TEXTURE_2D, 0, internalFormat, w, h, 0, format, type, data || null);
  const f = linear ? gl.LINEAR : gl.NEAREST;
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, f);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, f);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
  return t;
}
function makeFBO(tex) {
  const f = gl.createFramebuffer();
  gl.bindFramebuffer(gl.FRAMEBUFFER, f);
  gl.framebufferTexture2D(gl.FRAMEBUFFER, gl.COLOR_ATTACHMENT0, gl.TEXTURE_2D, tex, 0);
  if (gl.checkFramebufferStatus(gl.FRAMEBUFFER) !== gl.FRAMEBUFFER_COMPLETE) {
    S.fail('Framebuffer incomplete');
  }
  return f;
}

// Initial particle layout (random in central rectangle)
function initialState() {
  const arr = new Float32Array(S.N * 4);
  for (let i = 0; i < S.N; i++) {
    arr[i*4+0] = 0.30 + Math.random() * 0.40;
    arr[i*4+1] = 0.55 + Math.random() * 0.35;
    arr[i*4+2] = 0;
    arr[i*4+3] = 0;
  }
  return arr;
}
S.initialState = initialState;

S.stateTex = [
  makeTex(S.N_SIDE, S.N_SIDE, gl.RGBA32F, gl.RGBA, gl.FLOAT, initialState()),
  makeTex(S.N_SIDE, S.N_SIDE, gl.RGBA32F, gl.RGBA, gl.FLOAT, initialState()),
];
S.stateFBO = [makeFBO(S.stateTex[0]), makeFBO(S.stateTex[1])];

// Linear filtering for grid textures: critical so particles within a single
// grid cell don't all get the exact same force (which causes hex clumping).
S.densityTex   = makeTex(S.GRID, S.GRID, gl.RGBA16F, gl.RGBA, gl.HALF_FLOAT, null, true);
S.densityFBO   = makeFBO(S.densityTex);
S.forceTex     = makeTex(S.GRID, S.GRID, gl.RGBA16F, gl.RGBA, gl.HALF_FLOAT, null, true);
S.forceFBO     = makeFBO(S.forceTex);
S.collisionTex = makeTex(S.GRID, S.GRID, gl.R8,     gl.RED,  gl.UNSIGNED_BYTE, null, true);
S.collisionFBO = makeFBO(S.collisionTex);
// Velocity grid: per-cell sum of (vx*w, vy*w, w). Sampling gives weighted
// average velocity around the particle, used for XSPH viscosity coupling.
S.velTex = makeTex(S.GRID, S.GRID, gl.RGBA16F, gl.RGBA, gl.HALF_FLOAT, null, true);
S.velFBO = makeFBO(S.velTex);

// --- Geometry ---
S.quadVAO = gl.createVertexArray();
gl.bindVertexArray(S.quadVAO);
{
  const b = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, b);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  gl.enableVertexAttribArray(0);
  gl.vertexAttribPointer(0, 2, gl.FLOAT, false, 0, 0);
}

S.idxVAO = gl.createVertexArray();
gl.bindVertexArray(S.idxVAO);
{
  const idx = new Float32Array(S.N);
  for (let i = 0; i < S.N; i++) idx[i] = i;
  const b = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, b);
  gl.bufferData(gl.ARRAY_BUFFER, idx, gl.STATIC_DRAW);
  gl.enableVertexAttribArray(0);
  gl.vertexAttribPointer(0, 1, gl.FLOAT, false, 0, 0);
}
gl.bindVertexArray(null);

// helper: reset state textures
S.resetParticles = function () {
  const data = initialState();
  for (let i = 0; i < 2; i++) {
    gl.bindTexture(gl.TEXTURE_2D, S.stateTex[i]);
    gl.texSubImage2D(gl.TEXTURE_2D, 0, 0, 0, S.N_SIDE, S.N_SIDE, gl.RGBA, gl.FLOAT, data);
  }
};

// helper: rebuild state textures + index VAO at a different N_SIDE.
// Free old GL objects so we don't leak across changes.
S.setParticleCount = function (newSide) {
  if (newSide === S.N_SIDE) return;
  // Drop old textures / FBOs / VAO
  for (let i = 0; i < 2; i++) {
    gl.deleteTexture(S.stateTex[i]);
    gl.deleteFramebuffer(S.stateFBO[i]);
  }
  if (S.idxVAO) gl.deleteVertexArray(S.idxVAO);

  S.N_SIDE = newSide;
  S.N = newSide * newSide;
  const init = initialState();
  S.stateTex = [
    makeTex(S.N_SIDE, S.N_SIDE, gl.RGBA32F, gl.RGBA, gl.FLOAT, init),
    makeTex(S.N_SIDE, S.N_SIDE, gl.RGBA32F, gl.RGBA, gl.FLOAT, init),
  ];
  S.stateFBO = [makeFBO(S.stateTex[0]), makeFBO(S.stateTex[1])];

  S.idxVAO = gl.createVertexArray();
  gl.bindVertexArray(S.idxVAO);
  const idx = new Float32Array(S.N);
  for (let i = 0; i < S.N; i++) idx[i] = i;
  const b = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, b);
  gl.bufferData(gl.ARRAY_BUFFER, idx, gl.STATIC_DRAW);
  gl.enableVertexAttribArray(0);
  gl.vertexAttribPointer(0, 1, gl.FLOAT, false, 0, 0);
  gl.bindVertexArray(null);
};

// helper: clear collision
S.clearCollision = function () {
  gl.bindFramebuffer(gl.FRAMEBUFFER, S.collisionFBO);
  gl.viewport(0, 0, S.GRID, S.GRID);
  gl.clearColor(0,0,0,0);
  gl.clear(gl.COLOR_BUFFER_BIT);
};
S.clearCollision();
})();
</script>
<script id="loop">
"use strict";
(function () {
const S = window.__sph;
const gl = S.gl;
const P = S.programs;

// ----- Input: pointer drawing -----
let painting = false;
function paintAt(uvX, uvY) {
  gl.bindFramebuffer(gl.FRAMEBUFFER, S.collisionFBO);
  gl.viewport(0, 0, S.GRID, S.GRID);
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.ONE, gl.ONE);
  gl.useProgram(P.paint);
  gl.uniform2f(P.paint.U('u_center'), uvX, uvY);
  gl.uniform1f(P.paint.U('u_radius'), 0.025);
  gl.uniform1f(P.paint.U('u_value'),  1.0);
  gl.bindVertexArray(S.quadVAO);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  gl.disable(gl.BLEND);
}
function eventToSimUV(e) {
  const r = S.canvas.getBoundingClientRect();
  const sx = (e.clientX - r.left) / r.width;
  const sy = (e.clientY - r.top)  / r.height;
  // canvas NDC -> sim UV using current letterbox aspect
  const ax = S.aspect[0], ay = S.aspect[1];
  let nx = (sx * 2 - 1) / ax;
  let ny = (-(sy * 2 - 1)) / ay;
  if (nx < -1 || nx > 1 || ny < -1 || ny > 1) return null;
  return [nx * 0.5 + 0.5, ny * 0.5 + 0.5];
}
S.canvas.addEventListener('pointerdown', (e) => {
  painting = true;
  S.canvas.setPointerCapture(e.pointerId);
  const uv = eventToSimUV(e); if (uv) paintAt(uv[0], uv[1]);
});
S.canvas.addEventListener('pointermove', (e) => {
  if (!painting) return;
  const uv = eventToSimUV(e); if (uv) paintAt(uv[0], uv[1]);
});
function endPaint(e) { painting = false; try { S.canvas.releasePointerCapture(e.pointerId); } catch (_){} }
S.canvas.addEventListener('pointerup', endPaint);
S.canvas.addEventListener('pointercancel', endPaint);

// ----- Buttons -----
document.getElementById('reset').addEventListener('click', () => S.resetParticles());
document.getElementById('clearC').addEventListener('click', () => S.clearCollision());

// ----- Tuning panel -----
const panel = document.getElementById('panel');
document.getElementById('panelHdr').addEventListener('click', () => {
  panel.classList.toggle('collapsed');
  document.getElementById('panelToggle').textContent =
    panel.classList.contains('collapsed') ? '▲' : '▼';
});
function bindSlider(id, valId, prop, fmt) {
  const el = document.getElementById(id);
  const v  = document.getElementById(valId);
  const apply = () => {
    const x = parseFloat(el.value);
    PR[prop] = x;
    v.textContent = fmt ? fmt(x) : x.toFixed(2);
  };
  el.addEventListener('input', apply);
  apply();
}
bindSlider('s_splat', 'v_splat', 'splatPt',  (x) => x.toFixed(0));
bindSlider('s_rest',  'v_rest',  'rest',     (x) => x.toFixed(1));
bindSlider('s_stiff', 'v_stiff', 'stiff',    (x) => x.toFixed(2));
bindSlider('s_xsph',  'v_xsph',  'xsph',     (x) => x.toFixed(2));
bindSlider('s_damp',  'v_damp',  'damping',  (x) => x.toFixed(3));
bindSlider('s_grav',  'v_grav',  'gravity',  (x) => x.toFixed(2));
bindSlider('s_blob',  'v_blob',  'showBlob', (x) => x ? 'on' : 'off');
bindSlider('s_pts',   'v_pts',   'showPts',  (x) => x ? 'on' : 'off');

const countSel = document.getElementById('s_count');
const countVal = document.getElementById('v_count');
function applyCount() {
  const n = parseInt(countSel.value, 10);
  S.setParticleCount(n);
  countVal.textContent = n + '²';
  document.getElementById('np').textContent = (n*n).toLocaleString();
}
countSel.addEventListener('change', applyCount);
applyCount();

// ----- Motion / gravity -----
// gx/gy are computed in step() each frame from gMotionX/Y * PR.gravity.
let gx = 0, gy = 0;
let lastMotionTs = 0;
function onMotion(e) {
  const a = e.accelerationIncludingGravity;
  if (!a) return;
  lastMotionTs = performance.now();
  // Device frame: x right, y up, z toward viewer.
  // We want gravity vector in sim space (x right, y up).
  let ax = -a.x;
  let ay = -a.y;
  const angle = ((screen.orientation && screen.orientation.angle) || window.orientation || 0) * Math.PI / 180;
  const c = Math.cos(angle), s = Math.sin(angle);
  const rx =  c * ax + s * ay;
  const ry = -s * ax + c * ay;
  // Normalize device acceleration to a unit gravity vector, then scale
  // by the user's gravity slider in the main loop.
  const k = 1 / 9.81;
  gMotionX = rx * k;
  gMotionY = ry * k;
}
let gMotionX = 0, gMotionY = -1;
const motionBtn = document.getElementById('motion');
motionBtn.addEventListener('click', async () => {
  try {
    if (typeof DeviceMotionEvent !== 'undefined' &&
        typeof DeviceMotionEvent.requestPermission === 'function') {
      const perm = await DeviceMotionEvent.requestPermission();
      if (perm !== 'granted') { motionBtn.textContent = 'Motion denied'; return; }
    }
    window.addEventListener('devicemotion', onMotion);
    motionBtn.textContent = 'Motion on';
    motionBtn.disabled = true;
  } catch (err) {
    console.error(err);
    motionBtn.textContent = 'Motion error';
  }
});
// Auto-attach (works on Android without explicit permission)
try { window.addEventListener('devicemotion', onMotion); } catch (_) {}

// ----- Per-frame draw passes -----
S.aspect = [1, 1];
function updateAspect() {
  const w = S.canvas.width, h = S.canvas.height;
  // Letterbox a square sim into the viewport.
  if (w > h) { S.aspect[0] = h / w; S.aspect[1] = 1.0; }
  else       { S.aspect[0] = 1.0;   S.aspect[1] = w / h; }
}

let cur = 0; // ping-pong index
// Live-tunable params. Bound to sliders in the panel UI; defaults match
// the slider initial values in HTML.
S.params = {
  splatPt: 10.0,
  rest:    22.0,
  stiff:   0.6,
  xsph:    0.12,
  damping: 0.997,
  gravity: 1.4,
  showBlob: 1,
  showPts:  1,
};
const PR = S.params;

function splatScalarField(prog, fbo) {
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.viewport(0, 0, S.GRID, S.GRID);
  gl.clearColor(0, 0, 0, 0);
  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.ONE, gl.ONE);
  gl.useProgram(prog);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, S.stateTex[cur]);
  gl.uniform1i(prog.U('u_state'), 0);
  gl.uniform1f(prog.U('u_nside'), S.N_SIDE);
  gl.uniform1f(prog.U('u_pointSize'), PR.splatPt);
  gl.bindVertexArray(S.idxVAO);
  gl.drawArrays(gl.POINTS, 0, S.N);
  gl.disable(gl.BLEND);
}

function step(dt) {
  // Refresh gravity from motion vector + slider (or fall back to down).
  gx = gMotionX * PR.gravity;
  gy = gMotionY * PR.gravity;

  // 1) Splat density
  splatScalarField(P.splat, S.densityFBO);

  // 2) Splat velocity (vx*w, vy*w, w)
  splatScalarField(P.vsplat, S.velFBO);

  // 3) Particle update: per-particle pressure-gradient force +
  //    XSPH viscosity coupling + walls + collision.
  const nxt = 1 - cur;
  gl.bindFramebuffer(gl.FRAMEBUFFER, S.stateFBO[nxt]);
  gl.viewport(0, 0, S.N_SIDE, S.N_SIDE);
  gl.useProgram(P.update);
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, S.stateTex[cur]);
  gl.uniform1i(P.update.U('u_state'), 0);
  gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, S.densityTex);
  gl.uniform1i(P.update.U('u_density'), 1);
  gl.activeTexture(gl.TEXTURE2); gl.bindTexture(gl.TEXTURE_2D, S.velTex);
  gl.uniform1i(P.update.U('u_velGrid'), 2);
  gl.activeTexture(gl.TEXTURE3); gl.bindTexture(gl.TEXTURE_2D, S.collisionTex);
  gl.uniform1i(P.update.U('u_collision'), 3);
  gl.uniform2f(P.update.U('u_gravity'), gx, gy);
  gl.uniform1f(P.update.U('u_dt'), dt);
  gl.uniform1f(P.update.U('u_gridSize'), S.GRID);
  gl.uniform1f(P.update.U('u_damping'), PR.damping);
  gl.uniform1f(P.update.U('u_rest'),  PR.rest);
  gl.uniform1f(P.update.U('u_stiff'), PR.stiff);
  gl.uniform1f(P.update.U('u_xsph'),  PR.xsph);
  gl.bindVertexArray(S.quadVAO);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  cur = nxt;
}

function render() {
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(0, 0, S.canvas.width, S.canvas.height);

  // Background: fluid surface (from density) + collision walls.
  // u_blobAlpha=0 hides the fluid (debug aid: see only particles).
  gl.useProgram(P.bg);
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, S.collisionTex);
  gl.uniform1i(P.bg.U('u_collision'), 0);
  gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, S.densityTex);
  gl.uniform1i(P.bg.U('u_density'), 1);
  gl.uniform2f(P.bg.U('u_aspect'), S.aspect[0], S.aspect[1]);
  gl.uniform1f(P.bg.U('u_rest'), PR.rest);
  gl.uniform1f(P.bg.U('u_blobAlpha'), PR.showBlob ? 1.0 : 0.0);
  gl.bindVertexArray(S.quadVAO);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

  if (PR.showPts) {
    gl.enable(gl.BLEND);
    gl.blendFunc(gl.SRC_ALPHA, gl.ONE);
    gl.useProgram(P.render);
    gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, S.stateTex[cur]);
    gl.uniform1i(P.render.U('u_state'), 0);
    gl.uniform1f(P.render.U('u_nside'), S.N_SIDE);
    gl.uniform1f(P.render.U('u_pointSize'), 4.0 * S.DPR);
    gl.uniform2f(P.render.U('u_aspect'), S.aspect[0], S.aspect[1]);
    gl.bindVertexArray(S.idxVAO);
    gl.drawArrays(gl.POINTS, 0, S.N);
    gl.disable(gl.BLEND);
  }
}

// FPS counter
const fpsEl = document.getElementById('fps');
let fpsT = performance.now(), fpsN = 0;

function frame() {
  updateAspect();
  // Two substeps per frame for stability
  step(0.008);
  step(0.008);
  render();

  fpsN++;
  const now = performance.now();
  if (now - fpsT > 500) {
    const fps = (fpsN * 1000 / (now - fpsT)).toFixed(0);
    fpsEl.textContent = fps;
    fpsT = now; fpsN = 0;
    // Fallback gravity if no motion events for a while
    if (now - lastMotionTs > 1500) { gMotionX = 0; gMotionY = -1; }
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
})();
</script>
</body>
