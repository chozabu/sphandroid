<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>GPU SPH Fluid</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; background:#000; color:#fff;
    font-family: -apple-system, system-ui, sans-serif; touch-action:none;
    overscroll-behavior:none; user-select:none; -webkit-user-select:none; }
  canvas { display:block; width:100vw; height:100vh; touch-action:none; }
  .hud { position:fixed; top:8px; left:8px; z-index:10; font-size:12px;
    opacity:0.85; pointer-events:none; text-shadow:0 1px 2px #000; }
  .btns { position:fixed; top:8px; right:8px; z-index:10;
    display:flex; gap:6px; flex-direction:column; }
  button { background:#1a1a1aee; color:#fff; border:1px solid #3a3a3a;
    padding:8px 12px; font-size:13px; border-radius:6px; cursor:pointer;
    -webkit-tap-highlight-color:transparent; }
  button:active { background:#333; }
  #panel { position:fixed; bottom:8px; left:8px; right:8px; z-index:10;
    background:#0a0a0aee; border:1px solid #333; border-radius:8px;
    padding:10px 12px; font-size:12px; max-height:40vh; overflow-y:auto;
    transition: max-height 0.2s; }
  #panel.collapsed { max-height: 30px; overflow:hidden; padding:6px 12px; }
  #panelHdr { display:flex; justify-content:space-between; align-items:center;
    cursor:pointer; user-select:none; font-weight:bold; }
  .row { display:grid; grid-template-columns: 90px 1fr 56px; gap:8px;
    align-items:center; margin-top:6px; }
  .row label { opacity:0.85; }
  .row input[type=range] { width:100%; }
  .row .val { text-align:right; font-variant-numeric: tabular-nums; opacity:0.9; }
  .row select { width:100%; background:#1a1a1a; color:#fff; border:1px solid #333;
    padding:4px; border-radius:4px; font-size:12px; }
  #err { position:fixed; inset:0; display:none; align-items:flex-start;
    justify-content:center; padding:20px; background:#200ee; color:#fcc;
    font-size:13px; text-align:left; z-index:99; overflow-y:auto;
    white-space:pre-wrap; font-family: monospace; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud" id="hud">GPU SPH Fluid v0.21<br><span id="fps">--</span> fps &middot; <span id="np">--</span> p<br><span style="opacity:0.65">L draw · M attract · R erase</span></div>
<div class="btns">
  <button id="reset">Reset</button>
  <button id="clearC">Clear walls</button>
  <button id="motion">Enable motion</button>
</div>
<div id="panel" class="collapsed">
  <div id="panelHdr"><span>Tuning ▾ (tap to expand)</span><span id="panelToggle">▲</span></div>
  <div id="panelBody">
    <div class="row">
      <label>particles</label>
      <select id="s_count">
        <option value="32" selected>1,024 (32²)</option>
        <option value="64">4,096 (64²)</option>
        <option value="128">16,384 (128²)</option>
        <option value="192">36,864 (192²)</option>
        <option value="256">65,536 (256²)</option>
      </select>
      <span class="val" id="v_count">32²</span>
    </div>
    <div class="row">
      <label>splat px</label>
      <input id="s_splat" type="range" min="2" max="28" step="1" value="14">
      <span class="val" id="v_splat">14</span>
    </div>
    <div class="row">
      <label>kernel h</label>
      <input id="s_h" type="range" min="0.015" max="0.25" step="0.0005" value="0.18">
      <span class="val" id="v_h">0.1800</span>
    </div>
    <div class="row">
      <label>sound c</label>
      <input id="s_c" type="range" min="0.1" max="20" step="0.1" value="0.5">
      <span class="val" id="v_c">0.5</span>
    </div>
    <div class="row">
      <label>Tait γ</label>
      <input id="s_g" type="range" min="1" max="7" step="0.1" value="7">
      <span class="val" id="v_g">7.0</span>
    </div>
    <div class="row">
      <label>viscosity μ</label>
      <input id="s_mu" type="range" min="0" max="1" step="0.01" value="0.02">
      <span class="val" id="v_mu">0.02</span>
    </div>
    <div class="row">
      <label>anti-clump</label>
      <input id="s_k" type="range" min="0" max="0.5" step="0.005" value="0.1">
      <span class="val" id="v_k">0.100</span>
    </div>
    <div class="row">
      <label>gravity</label>
      <input id="s_grav" type="range" min="0" max="4" step="0.05" value="1.4">
      <span class="val" id="v_grav">1.40</span>
    </div>
    <div class="row">
      <label>substeps</label>
      <input id="s_subs" type="range" min="2" max="24" step="1" value="12">
      <span class="val" id="v_subs">12</span>
    </div>
    <div class="row">
      <label>show fluid</label>
      <input id="s_blob" type="range" min="0" max="1" step="1" value="1">
      <span class="val" id="v_blob">on</span>
    </div>
    <div class="row">
      <label>show pts</label>
      <input id="s_pts" type="range" min="0" max="1" step="1" value="1">
      <span class="val" id="v_pts">on</span>
    </div>
  </div>
</div>
<div id="err"></div>
<script id="main">
"use strict";
// === SPH GPU FLUID ===
// Approach: real SPH with spatial-hash neighbour search on the GPU.
// Each frame the K=4 spatial-hash textures are rebuilt by rasterising
// every particle to one pixel in its grid cell (K slots to reduce
// last-write collisions). The update shader then iterates a 5x5
// neighbour-cell window across all K slots, accumulating direct
// pairwise repulsion + XSPH viscosity — no density-grid smoothing, so
// sub-pixel-close particles still feel each other.
// A cheap density splat is still run to render the fluid-blob bg.

// Make any uncaught error visible on screen so phone debugging is possible
// without USB devtools.
(function () {
  const errEl = document.getElementById('err');
  function show(msg) {
    errEl.style.display = 'flex';
    errEl.textContent = (errEl.textContent ? errEl.textContent + '\n\n' : '') + msg;
  }
  window.addEventListener('error', (e) => {
    show('JS Error: ' + (e.message || e) +
      (e.filename ? '\n  at ' + e.filename + ':' + e.lineno + ':' + e.colno : ''));
  });
  window.addEventListener('unhandledrejection', (e) => {
    show('Promise rejection: ' + (e.reason && e.reason.message || e.reason));
  });
  window.__showErr = show;
})();
// Pass 1: splat particle kernels into densityTex (additive blend).
// Pass 2: fullscreen pass -> forceTex = -grad(pressure)/density.
// Pass 3: fullscreen pass -> next stateTex (pos,vel) integrating force, gravity,
//         walls, and collision mask. Pass 4: render particles to canvas.

(function () {
const canvas = document.getElementById('c');
const errEl = document.getElementById('err');
function fail(msg) { errEl.style.display = 'flex'; errEl.textContent = msg; throw new Error(msg); }

const gl = canvas.getContext('webgl2', { antialias:false, alpha:false, premultipliedAlpha:false });
if (!gl) fail('WebGL2 not available. Try a recent Chrome/Firefox.');
if (!gl.getExtension('EXT_color_buffer_float')) fail('EXT_color_buffer_float not available.');

const N_SIDE = 128;            // 128*128 = 16384 particles
const N = N_SIDE * N_SIDE;
const GRID = 128;              // density / force / collision grid
const DPR = Math.min(window.devicePixelRatio || 1, 2);

function resize() {
  canvas.width  = Math.floor(window.innerWidth  * DPR);
  canvas.height = Math.floor(window.innerHeight * DPR);
}
resize();
window.addEventListener('resize', resize);

// --- shaders are appended in subsequent script blocks below ---
window.__sph = { gl, canvas, N_SIDE, N, GRID, DPR, fail };
})();
</script>
<script id="shaders">
"use strict";
try {
(function () {
const S = window.__sph;

// Fullscreen quad vertex shader
S.VS_QUAD = `#version 300 es
layout(location=0) in vec2 a_pos;
out vec2 v_uv;
void main() {
  v_uv = a_pos * 0.5 + 0.5;
  gl_Position = vec4(a_pos, 0.0, 1.0);
}`;

// Particle splat vertex shader (reads pos from state texture)
S.VS_SPLAT = `#version 300 es
layout(location=0) in float a_index;
uniform sampler2D u_state;
uniform float u_nside;
uniform float u_pointSize;
void main() {
  float idx = a_index;
  vec2 uv = (vec2(mod(idx, u_nside), floor(idx / u_nside)) + 0.5) / u_nside;
  vec4 s = texture(u_state, uv);
  gl_Position = vec4(s.xy * 2.0 - 1.0, 0.0, 1.0);
  gl_PointSize = u_pointSize;
}`;

// Hash-build vertex: rasterizes each particle to a single pixel in its
// spatial-hash cell. Particles are split across K slots by index; only
// the slot-matching particles render this pass, the rest are pushed
// off-screen. Last-write-wins handles the rare case of 2+ particles in
// the same cell & slot (losses only mean a neighbour is occasionally
// skipped, not a physics bug).
S.VS_HASH = `#version 300 es
layout(location=0) in float a_index;
uniform sampler2D u_state;
uniform float u_nside;
uniform float u_gridHash;
uniform int u_K;
uniform int u_slot;
flat out vec4 v_state;
void main() {
  int idxI = int(a_index + 0.5);
  float idxF = float(idxI);
  float nside = u_nside;
  vec2 uv = (vec2(mod(idxF, nside), floor(idxF / nside)) + 0.5) / nside;
  vec4 s = texture(u_state, uv);
  v_state = s;
  if ((idxI - (idxI / u_K) * u_K) != u_slot) {
    gl_Position = vec4(-10.0, -10.0, 0.0, 1.0);
    gl_PointSize = 1.0;
    return;
  }
  vec2 pos = clamp(s.xy, 1e-4, 1.0 - 1e-4);
  vec2 cell = floor(pos * u_gridHash);
  vec2 cellUV = (cell + 0.5) / u_gridHash;
  gl_Position = vec4(cellUV * 2.0 - 1.0, 0.0, 1.0);
  gl_PointSize = 1.0;
}`;

S.FS_HASH = `#version 300 es
precision highp float;
flat in vec4 v_state;
out vec4 outColor;
void main() {
  outColor = v_state;
}`;

// Second hash-build vertex: stores (pos.xy, ρᵢ, 0) instead of (pos, vel).
// Needed so the force pass can read ρⱼ per neighbour and use the full
// Müller symmetric pressure formula a = -Σⱼ m·(pᵢ+pⱼ)/(2·ρᵢ·ρⱼ)·∇W.
// Using pⱼ ≈ pᵢ drops the sum to a constant × Σ∇W, which is identically
// zero for isotropic neighbourhoods — the pressure gradient vanishes in
// the pile interior and only the free surface feels any force.
S.VS_HASH_RHO = `#version 300 es
layout(location=0) in float a_index;
uniform sampler2D u_state;
uniform sampler2D u_rho;
uniform float u_nside;
uniform float u_gridHash;
uniform int u_K;
uniform int u_slot;
flat out vec4 v_state;
void main() {
  int idxI = int(a_index + 0.5);
  float idxF = float(idxI);
  vec2 uv = (vec2(mod(idxF, u_nside), floor(idxF / u_nside)) + 0.5) / u_nside;
  vec4 s = texture(u_state, uv);
  float rho_i = texture(u_rho, uv).r;
  v_state = vec4(s.xy, rho_i, 0.0);
  if ((idxI - (idxI / u_K) * u_K) != u_slot) {
    gl_Position = vec4(-10.0, -10.0, 0.0, 1.0);
    gl_PointSize = 1.0;
    return;
  }
  vec2 pos = clamp(s.xy, 1e-4, 1.0 - 1e-4);
  vec2 cell = floor(pos * u_gridHash);
  vec2 cellUV = (cell + 0.5) / u_gridHash;
  gl_Position = vec4(cellUV * 2.0 - 1.0, 0.0, 1.0);
  gl_PointSize = 1.0;
}`;

// Per-particle density pass: for each particle i, sums the 2D Poly6
// kernel W(r_ij, h) = (4/(π·h⁸))·(h²−r²)³ over its hash neighbours.
// Gives the proper SPH density field that the pressure solver needs.
// Unlike the grid-splat used for bg visualisation, this shares the
// same h, neighbour search and mass as the force pass, so everything
// is consistent.
S.FS_DENSITY = `#version 300 es
precision highp float;
in vec2 v_uv;
uniform sampler2D u_state;
uniform sampler2D u_hash0;
uniform sampler2D u_hash1;
uniform sampler2D u_hash2;
uniform sampler2D u_hash3;
uniform float u_gridHash;
uniform float u_h;
uniform float u_m;
out vec4 outColor;

void addPair(vec4 n, vec2 pos, float h2, inout float rho) {
  if (n.x < -0.5) return;
  vec2 r = pos - n.xy;
  float rr = dot(r, r);
  if (rr >= h2 || rr < 1e-20) return;
  float diff = h2 - rr;
  rho += diff * diff * diff;  // unnormalised (h²-r²)³
}

void main() {
  vec4 s = texture(u_state, v_uv);
  vec2 pos = s.xy;
  vec2 posCl = clamp(pos, 1e-4, 1.0 - 1e-4);
  vec2 cell = floor(posCl * u_gridHash);
  float h2 = u_h * u_h;
  float rho = 0.0;
  // 7x7 search covers h up to ~3.5·cell_size.  Default h_auto = 3/√N
  // gives h/cell ≈ 3 at any N if GRID_HASH = N_SIDE, so we need enough
  // slack to catch cardinal-direction neighbours at the very edge of h.
  for (int dy = -3; dy <= 3; dy++) {
    for (int dx = -3; dx <= 3; dx++) {
      vec2 nCell = cell + vec2(float(dx), float(dy));
      if (nCell.x < 0.0 || nCell.x >= u_gridHash ||
          nCell.y < 0.0 || nCell.y >= u_gridHash) continue;
      vec2 cellUV = (nCell + 0.5) / u_gridHash;
      addPair(texture(u_hash0, cellUV), pos, h2, rho);
      addPair(texture(u_hash1, cellUV), pos, h2, rho);
      addPair(texture(u_hash2, cellUV), pos, h2, rho);
      addPair(texture(u_hash3, cellUV), pos, h2, rho);
    }
  }
  // Apply Poly6 2D normalisation  4/(π·h⁸)  and particle mass.
  float h8 = h2 * h2 * h2 * h2;
  rho *= u_m * 4.0 / (3.14159265 * h8);
  outColor = vec4(rho, 0.0, 0.0, 1.0);
}`;

// Velocity-splat vertex: same as density splat but also forwards velocity.
S.VS_VSPLAT = `#version 300 es
layout(location=0) in float a_index;
uniform sampler2D u_state;
uniform float u_nside;
uniform float u_pointSize;
out vec2 v_vel;
void main() {
  float idx = a_index;
  vec2 uv = (vec2(mod(idx, u_nside), floor(idx / u_nside)) + 0.5) / u_nside;
  vec4 s = texture(u_state, uv);
  gl_Position = vec4(s.xy * 2.0 - 1.0, 0.0, 1.0);
  gl_PointSize = u_pointSize;
  v_vel = s.zw;
}`;

// Velocity-splat fragment: outputs (vx*k, vy*k, k, 0) with same kernel as
// density splat, so weighted-average velocity = (sum_vx, sum_vy) / sum_k.
S.FS_VSPLAT = `#version 300 es
precision highp float;
in vec2 v_vel;
out vec4 outColor;
void main() {
  vec2 c = gl_PointCoord - 0.5;
  float r2 = dot(c, c);
  if (r2 > 0.25) discard;
  float r = sqrt(r2) * 2.0;
  float k = 1.0 - 3.0*r*r + 2.0*r*r*r;
  outColor = vec4(v_vel * k, k, 0.0);
}`;

// Splat fragment: smooth Gaussian-like kernel with cubic-spline shape.
// Wide soft kernels avoid the step-y density field that traps particles
// in hex lattices.
S.FS_SPLAT = `#version 300 es
precision highp float;
out vec4 outColor;
void main() {
  vec2 c = gl_PointCoord - 0.5;
  float r2 = dot(c, c);
  if (r2 > 0.25) discard;
  float r = sqrt(r2) * 2.0;          // [0,1]
  float k = 1.0 - 3.0*r*r + 2.0*r*r*r; // cubic Hermite, smooth at center & edge
  outColor = vec4(k, 0.0, 0.0, 1.0);
}`;

// Force-field pass: density -> -grad(pressure) / density.
// Uses a slightly nonlinear (Tait-ish) pressure with a small "background"
// term so even moderately-dense interiors produce gradient, not just edges.
S.FS_FORCE = `#version 300 es
precision highp float;
in vec2 v_uv;
uniform sampler2D u_density;
uniform float u_gridSize;
uniform float u_rest;
uniform float u_stiff;
out vec4 outColor;
float pressure(float d) {
  float x = max(d / u_rest, 0.0);
  // Tait-ish: soft below rest, much stiffer above.
  return u_stiff * (x*x - 1.0);
}
void main() {
  float h = 1.5 / u_gridSize;        // wider stencil = smoother gradient field
  float dc = texture(u_density, v_uv).r;
  float dl = texture(u_density, v_uv - vec2(h, 0.0)).r;
  float dr = texture(u_density, v_uv + vec2(h, 0.0)).r;
  float du = texture(u_density, v_uv + vec2(0.0, h)).r;
  float dd = texture(u_density, v_uv - vec2(0.0, h)).r;
  vec2 gradP = vec2(pressure(dr) - pressure(dl),
                    pressure(du) - pressure(dd)) / (2.0 * h * u_gridSize);
  vec2 force = -gradP / max(dc, 0.5);
  outColor = vec4(force, dc, 1.0);
}`;

// Particle update pass — clean Müller 2003 / Becker & Teschner 2007 WCSPH.
//   ρ_i from FS_DENSITY (Poly6, same h as forces, per-particle)
//   Tait EoS: p = B · ((ρ/ρ₀)^γ − 1),  B = ρ₀·c²/γ,   clamped ≥ 0
//   pressure accel  a_p = −Σⱼ m·(pᵢ/ρᵢ² + pⱼ/ρⱼ²) · ∇W_spiky
//   viscosity accel a_v = μ·Σⱼ m·(vⱼ − vᵢ)/ρⱼ · ∇²W_visc
//   ρ₀ = 1, m = 1/N.  All kernel normalisations are the canonical 2D forms
//   (Poly6 4/(π·h⁸), Spiky-grad 30/(π·h⁵), Visc-lap 20/(π·h⁵)).
//   No damping, no vmax cap, no symmetry-breaking hacks.
S.FS_UPDATE = `#version 300 es
precision highp float;
in vec2 v_uv;
uniform sampler2D u_state;
uniform sampler2D u_rho;
uniform sampler2D u_hash0;
uniform sampler2D u_hash1;
uniform sampler2D u_hash2;
uniform sampler2D u_hash3;
uniform sampler2D u_hashR0;
uniform sampler2D u_hashR1;
uniform sampler2D u_hashR2;
uniform sampler2D u_hashR3;
uniform sampler2D u_collision;
uniform vec2  u_gravity;
uniform float u_dt;
uniform float u_gridHash;
uniform float u_gridColl;
uniform float u_h;
uniform float u_m;
uniform float u_c;        // sound speed (Tait: B = ρ₀·c²/γ)
uniform float u_gamma;    // Tait exponent
uniform float u_mu;       // viscosity coefficient
uniform float u_kScorr;   // Macklin 2013 artificial-pressure strength
uniform vec2  u_attractPos;
uniform float u_attract;  // 0 = off, >0 = pull toward u_attractPos
out vec4 outColor;

float taitPressure(float rho, float B) {
  return (rho > 1.0) ? B * (pow(rho, u_gamma) - 1.0) : 0.0;
}

void process(vec4 n, vec4 nR, vec2 pos_i, vec2 vel_i,
             float p_i, float rho_i, float B,
             float spiky_c, float visc_c, float h_val,
             inout vec2 aPres, inout vec2 aVisc) {
  if (n.x < -0.5) return;
  vec2 r = pos_i - n.xy;
  float rr = dot(r, r);
  float h2 = h_val * h_val;
  if (rr >= h2 || rr < 1e-20) return;
  float rLen = sqrt(rr);
  float diff = h_val - rLen;
  vec2 dir = r / rLen;  // unit vector from j to i

  // Look up neighbour's density & pressure (ρ₀ = 1 baked into pressure fn).
  float rho_j = max(nR.z, 1e-6);
  float p_j   = taitPressure(rho_j, B);

  // Macklin & Müller 2013 artificial pressure term (PBF eq. 13):
  //   s_corr = k · (W_poly6(r,h) / W_poly6(Δq,h))^n,   Δq = 0.2·h, n = 4
  // Acts as an always-positive repulsive pressure concentrated near r=0,
  // which prevents the WCSPH "stuck pairs" failure mode: below-rest-density
  // regions have p=0 under Müller's clamp, so isolated particle pairs can
  // merge freely. s_corr pushes them apart regardless of density.
  float h2       = h_val * h_val;
  float dq2      = 0.04 * h2;                      // (0.2·h)²
  float wRatio   = (h2 - rr) / max(h2 - dq2, 1e-6);  // Poly6 ratio base
  // W_poly6 ∝ (h²-r²)³, so the ratio of W's is wRatio³.  Raise that to
  // n=4: total power 12.
  float wr12     = pow(wRatio, 12.0);
  float sCorr    = u_kScorr * wr12;

  // Müller symmetric pressure accel + PBF artificial pressure:
  //   a = +Σⱼ m · [(pᵢ+pⱼ)/(2·ρᵢ·ρⱼ) + sCorr] · (30/(π·h⁵))·(h−r)² · r̂
  float pCoef = (p_i + p_j) / (2.0 * rho_i * rho_j) + sCorr;
  aPres += u_m * pCoef * spiky_c * diff * diff * dir;

  // Müller viscosity accel (proper form with ρⱼ lookup):
  //   a = μ·Σⱼ m·(vⱼ−vᵢ)/(ρᵢ·ρⱼ) · ∇²W_visc
  aVisc += u_mu * u_m / (rho_i * rho_j) * visc_c * diff * (n.zw - vel_i);
}

void main() {
  vec4 s = texture(u_state, v_uv);
  vec2 pos = s.xy;
  vec2 vel = s.zw;

  // Sample this particle's density from the density-pass texture.
  float rho_i = max(texture(u_rho, v_uv).r, 1e-6);

  // Tait equation of state.  REST_RHO = 1 (normalised so m = 1/N gives
  // ρ ≈ 1 at uniform distribution).  Clamped ≥ 0 — no tensile forces.
  float B = u_c * u_c / u_gamma;             // ρ₀ = 1 folded in
  float p_i = taitPressure(rho_i, B);

  // Kernel normalisations (2D).
  float h5 = u_h * u_h * u_h * u_h * u_h;
  float spiky_c = 30.0 / (3.14159265 * h5);
  float visc_c  = 20.0 / (3.14159265 * h5);

  vec2 posCl = clamp(pos, 1e-4, 1.0 - 1e-4);
  vec2 cell = floor(posCl * u_gridHash);

  vec2 aPres = vec2(0.0);
  vec2 aVisc = vec2(0.0);

  for (int dy = -3; dy <= 3; dy++) {
    for (int dx = -3; dx <= 3; dx++) {
      vec2 nCell = cell + vec2(float(dx), float(dy));
      if (nCell.x < 0.0 || nCell.x >= u_gridHash ||
          nCell.y < 0.0 || nCell.y >= u_gridHash) continue;
      vec2 cellUV = (nCell + 0.5) / u_gridHash;
      process(texture(u_hash0,  cellUV), texture(u_hashR0, cellUV),

  vec2 aExt = u_gravity;
  if (u_attract > 0.0) {
    vec2 toMouse = u_attractPos - pos;
    float d = length(toMouse) + 1e-4;
    aExt += u_attract * toMouse / d;   // constant-magnitude pull

  // practice; full reflection with restitution continuously pumps
  // kinetic energy back into the sim as gravity re-accelerates particles
  // into the wall, and viscosity can't dissipate it fast enough → the
  // "violent jiggle" the user was seeing.

uniform sampler2D u_state;
uniform float u_nside;
uniform float u_pointSize;
uniform vec2  u_aspect; // multiply NDC to letterbox-fit a square sim

in float v_speed;
out vec4 outColor;
void main() {
  vec2 c = gl_PointCoord - 0.5;
  float r = length(c);
  if (r > 0.5) discard;
  float a = smoothstep(0.5, 0.0, r);
  vec3 cold = vec3(0.20, 0.55, 1.00);
  vec3 hot  = vec3(1.00, 0.75, 0.30);
  vec3 col = mix(cold, hot, clamp(v_speed * 1.2, 0.0, 1.0));
  outColor = vec4(col * a, a);

// Background pass: draws a fluid surface from the density texture plus
// the collision walls. Lets you see whether the field is one connected
// blob (good) or many disconnected pools (the failure mode we're chasing).
S.FS_BG = `#version 300 es
precision highp float;
in vec2 v_uv;
uniform sampler2D u_collision;
uniform sampler2D u_density;
uniform vec2 u_aspect;
uniform float u_rest;
uniform float u_blobAlpha;

  vec3 wall = vec3(0.55, 0.35, 0.65);
  vec3 bg = vec3(0.02, 0.02, 0.05);

// Touch paint: draws an additive radial blob into the collision tex
S.FS_PAINT = `#version 300 es

in vec2 v_uv;
uniform vec2 u_center;
uniform float u_radius;
uniform float u_value;
out vec4 outColor;
void main() {
  float d = distance(v_uv, u_center);

  hashRho: link(S.VS_HASH_RHO, S.FS_HASH),    // hash with (pos, ρ, 0)

    arr[i*4+1] = 0.005 + Math.random() * 0.99;

gl.bindVertexArray(S.idxVAO);

  const idx = new Float32Array(S.N);

  gl.bindBuffer(gl.ARRAY_BUFFER, b);

  S.GRID_HASH = Math.max(8, Math.floor(S.N_SIDE / 2));

    makeTex(S.N_SIDE, S.N_SIDE, gl.RGBA32F, gl.RGBA, gl.FLOAT, init),
    makeTex(S.N_SIDE, S.N_SIDE, gl.RGBA32F, gl.RGBA, gl.FLOAT, init),

  S.rhoTex = makeTex(S.N_SIDE, S.N_SIDE, gl.RGBA16F, gl.RGBA, gl.HALF_FLOAT, null, false);
  S.rhoFBO = makeFBO(S.rhoTex);

  c:        0.5,     // sound speed (softer fluid)
  gamma:    7.0,     // Tait exponent
  mu:       0.02,    // low viscosity — fluid flows, not syrup

  gravity:  1.4,

  attractY: 0.5,

  const sy = (e.clientY - r.top)  / r.height;

    if (typeof DeviceMotionEvent !== 'undefined' &&
        typeof DeviceMotionEvent.requestPermission === 'function') {
      const perm = await DeviceMotionEvent.requestPermission();
      if (perm !== 'granted') { motionBtn.textContent = 'Motion denied'; return; }
    }
    window.addEventListener('devicemotion', onMotion);
    motionBtn.textContent = 'Motion on';
    motionBtn.disabled = true;
  } catch (err) {
    console.error(err);
    motionBtn.textContent = 'Motion error';
  }
});
// Auto-attach (works on Android without explicit permission)
try { window.addEventListener('devicemotion', onMotion); } catch (_) {}

// ----- Per-frame draw passes -----
S.aspect = [1, 1];
function updateAspect() {
  const w = S.canvas.width, h = S.canvas.height;
  // Letterbox a square sim into the viewport.
  if (w > h) { S.aspect[0] = h / w; S.aspect[1] = 1.0; }
  else       { S.aspect[0] = 1.0;   S.aspect[1] = w / h; }
}

function splatScalarField(prog, fbo) {
  gl.bindFramebuffer(gl.FRAMEBUFFER, fbo);
  gl.viewport(0, 0, S.GRID, S.GRID);
  gl.clearColor(0, 0, 0, 0);
  gl.clear(gl.COLOR_BUFFER_BIT);
  gl.enable(gl.BLEND);
  gl.blendFunc(gl.ONE, gl.ONE);
  gl.useProgram(prog);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D, S.stateTex[cur]);
  gl.uniform1i(prog.U('u_state'), 0);
  gl.uniform1f(prog.U('u_nside'), S.N_SIDE);
  gl.uniform1f(prog.U('u_pointSize'), PR.splatPt);
  gl.bindVertexArray(S.idxVAO);
  gl.drawArrays(gl.POINTS, 0, S.N);
  gl.disable(gl.BLEND);
}

function step(dt) {
  gx = gMotionX * PR.gravity;
  gy = gMotionY * PR.gravity;

  // 1) Build K spatial-hash textures. Each pass renders all N particles
  //    but only those with index%K == slot end up on-screen at their cell.
  gl.disable(gl.BLEND);           // hash writes need last-write-wins, not sum
  gl.disable(gl.DEPTH_TEST);
  for (let k = 0; k < S.K_HASH; k++) {
    gl.bindFramebuffer(gl.FRAMEBUFFER, S.hashFBO[k]);
    gl.viewport(0, 0, S.GRID_HASH, S.GRID_HASH);
    gl.clearColor(-10, -10, 0, 0);   // sentinel "empty cell"
    gl.clear(gl.COLOR_BUFFER_BIT);
    gl.useProgram(P.hash);
    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, S.stateTex[cur]);
    gl.uniform1i(P.hash.U('u_state'), 0);
    gl.uniform1f(P.hash.U('u_nside'), S.N_SIDE);
    gl.uniform1f(P.hash.U('u_gridHash'), S.GRID_HASH);
    gl.uniform1i(P.hash.U('u_K'), S.K_HASH);
    gl.uniform1i(P.hash.U('u_slot'), k);
    gl.bindVertexArray(S.idxVAO);
    gl.drawArrays(gl.POINTS, 0, S.N);
  }

  // 2) Density splat — bg blob viz only (not read by physics).
  splatScalarField(P.splat, S.densityFBO);

  // 3) Density pass — compute ρᵢ per particle via Poly6 sum over hash
  //    neighbours.  Writes to S.rhoTex (one texel per particle).
  gl.bindFramebuffer(gl.FRAMEBUFFER, S.rhoFBO);
  gl.viewport(0, 0, S.N_SIDE, S.N_SIDE);
  gl.useProgram(P.density);
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, S.stateTex[cur]);
  gl.uniform1i(P.density.U('u_state'), 0);
  gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, S.hashTex[0]);
  gl.uniform1i(P.density.U('u_hash0'), 1);
  gl.activeTexture(gl.TEXTURE2); gl.bindTexture(gl.TEXTURE_2D, S.hashTex[1]);
  gl.uniform1i(P.density.U('u_hash1'), 2);
  gl.activeTexture(gl.TEXTURE3); gl.bindTexture(gl.TEXTURE_2D, S.hashTex[2]);
  gl.uniform1i(P.density.U('u_hash2'), 3);
  gl.activeTexture(gl.TEXTURE4); gl.bindTexture(gl.TEXTURE_2D, S.hashTex[3]);
  gl.uniform1i(P.density.U('u_hash3'), 4);
  gl.uniform1f(P.density.U('u_gridHash'), S.GRID_HASH);
  gl.uniform1f(P.density.U('u_h'), PR.h);
  gl.uniform1f(P.density.U('u_m'), 1.0 / S.N);
  gl.bindVertexArray(S.quadVAO);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

  // 4) Build hashRho — stores (pos, ρᵢ, 0) per slot so the force pass can
  //    read ρⱼ per neighbour and use the full Müller symmetric pressure
  //    formula (the ρⱼ≈ρᵢ approximation killed the interior gradient).
  for (let k = 0; k < S.K_HASH; k++) {
    gl.bindFramebuffer(gl.FRAMEBUFFER, S.hashRhoFBO[k]);
    gl.viewport(0, 0, S.GRID_HASH, S.GRID_HASH);
    gl.clearColor(-10, -10, 0, 0);
    gl.clear(gl.COLOR_BUFFER_BIT);
    gl.useProgram(P.hashRho);
    gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, S.stateTex[cur]);
    gl.uniform1i(P.hashRho.U('u_state'), 0);
    gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, S.rhoTex);
    gl.uniform1i(P.hashRho.U('u_rho'), 1);
    gl.uniform1f(P.hashRho.U('u_nside'), S.N_SIDE);
    gl.uniform1f(P.hashRho.U('u_gridHash'), S.GRID_HASH);
    gl.uniform1i(P.hashRho.U('u_K'), S.K_HASH);
    gl.uniform1i(P.hashRho.U('u_slot'), k);
    gl.bindVertexArray(S.idxVAO);
    gl.drawArrays(gl.POINTS, 0, S.N);
  }

  // 5) Particle update — full Müller symmetric WCSPH.
  const nxt = 1 - cur;
  gl.bindFramebuffer(gl.FRAMEBUFFER, S.stateFBO[nxt]);
  gl.viewport(0, 0, S.N_SIDE, S.N_SIDE);
  gl.useProgram(P.update);
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, S.stateTex[cur]);
  gl.uniform1i(P.update.U('u_state'), 0);
  gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, S.rhoTex);
  gl.uniform1i(P.update.U('u_rho'), 1);
  gl.activeTexture(gl.TEXTURE2); gl.bindTexture(gl.TEXTURE_2D, S.hashTex[0]);
  gl.uniform1i(P.update.U('u_hash0'), 2);
  gl.activeTexture(gl.TEXTURE3); gl.bindTexture(gl.TEXTURE_2D, S.hashTex[1]);
  gl.uniform1i(P.update.U('u_hash1'), 3);
  gl.activeTexture(gl.TEXTURE4); gl.bindTexture(gl.TEXTURE_2D, S.hashTex[2]);
  gl.uniform1i(P.update.U('u_hash2'), 4);
  gl.activeTexture(gl.TEXTURE5); gl.bindTexture(gl.TEXTURE_2D, S.hashTex[3]);
  gl.uniform1i(P.update.U('u_hash3'), 5);
  gl.activeTexture(gl.TEXTURE6); gl.bindTexture(gl.TEXTURE_2D, S.collisionTex);
  gl.uniform1i(P.update.U('u_collision'), 6);
  gl.activeTexture(gl.TEXTURE7); gl.bindTexture(gl.TEXTURE_2D, S.hashRhoTex[0]);
  gl.uniform1i(P.update.U('u_hashR0'), 7);
  gl.activeTexture(gl.TEXTURE8); gl.bindTexture(gl.TEXTURE_2D, S.hashRhoTex[1]);
  gl.uniform1i(P.update.U('u_hashR1'), 8);
  gl.activeTexture(gl.TEXTURE9); gl.bindTexture(gl.TEXTURE_2D, S.hashRhoTex[2]);
  gl.uniform1i(P.update.U('u_hashR2'), 9);
  gl.activeTexture(gl.TEXTURE10); gl.bindTexture(gl.TEXTURE_2D, S.hashRhoTex[3]);
  gl.uniform1i(P.update.U('u_hashR3'), 10);
  gl.uniform2f(P.update.U('u_gravity'), gx, gy);
  gl.uniform1f(P.update.U('u_dt'), dt);
  gl.uniform1f(P.update.U('u_gridHash'), S.GRID_HASH);
  gl.uniform1f(P.update.U('u_gridColl'), S.GRID);
  gl.uniform1f(P.update.U('u_h'),     PR.h);
  gl.uniform1f(P.update.U('u_m'),     1.0 / S.N);
  gl.uniform1f(P.update.U('u_c'),     PR.c);
  gl.uniform1f(P.update.U('u_gamma'), PR.gamma);
  gl.uniform1f(P.update.U('u_mu'),    PR.mu);
  gl.uniform1f(P.update.U('u_kScorr'),PR.kScorr);
  gl.uniform2f(P.update.U('u_attractPos'), PR.attractX, PR.attractY);
  gl.uniform1f(P.update.U('u_attract'),    PR.attract);
  gl.bindVertexArray(S.quadVAO);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  cur = nxt;
}

function render() {
  gl.bindFramebuffer(gl.FRAMEBUFFER, null);
  gl.viewport(0, 0, S.canvas.width, S.canvas.height);

  // Background: fluid surface (from density) + collision walls.
  // u_blobAlpha=0 hides the fluid (debug aid: see only particles).
  gl.useProgram(P.bg);
  gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, S.collisionTex);
  gl.uniform1i(P.bg.U('u_collision'), 0);
  gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, S.densityTex);
  gl.uniform1i(P.bg.U('u_density'), 1);
  gl.uniform2f(P.bg.U('u_aspect'), S.aspect[0], S.aspect[1]);
  // BG blob rendering still uses splat-grid density values, not the new
  // Poly6 ρᵢ. Calibrated threshold empirically proportional to N.
  gl.uniform1f(P.bg.U('u_rest'), S.N * 0.00143);
  gl.uniform1f(P.bg.U('u_blobAlpha'), PR.showBlob ? 1.0 : 0.0);
  gl.bindVertexArray(S.quadVAO);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

  if (PR.showPts) {
    gl.enable(gl.BLEND);
    gl.blendFunc(gl.SRC_ALPHA, gl.ONE);
    gl.useProgram(P.render);
    gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, S.stateTex[cur]);
    gl.uniform1i(P.render.U('u_state'), 0);
    gl.uniform1f(P.render.U('u_nside'), S.N_SIDE);
    gl.uniform1f(P.render.U('u_pointSize'), 4.0 * S.DPR);
    gl.uniform2f(P.render.U('u_aspect'), S.aspect[0], S.aspect[1]);
    gl.bindVertexArray(S.idxVAO);
    gl.drawArrays(gl.POINTS, 0, S.N);
    gl.disable(gl.BLEND);
  }
}

// FPS counter
const fpsEl = document.getElementById('fps');
let fpsT = performance.now(), fpsN = 0;

function frame() {
  updateAspect();
  // Sub-step integration: dt_frame is fixed (~16 ms), dt_substep is
  // dt_frame / substeps. More substeps → smaller dt → more stable at
  // high Tait pressures, at proportional GPU cost.
  const nSub = Math.max(1, Math.round(PR.substeps));
  const dt = 0.016 / nSub;
  for (let i = 0; i < nSub; i++) step(dt);
  render();

  fpsN++;
  const now = performance.now();
  if (now - fpsT > 500) {
    const fps = (fpsN * 1000 / (now - fpsT)).toFixed(0);
    fpsEl.textContent = fps;
    fpsT = now; fpsN = 0;
    // Fallback gravity if no motion events for a while
    if (now - lastMotionTs > 1500) { gMotionX = 0; gMotionY = -1; }
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
})();
} catch (e) { window.__showErr('loop: ' + e.message + '\n' + (e.stack||'')); throw e; }
</script>
</body>
